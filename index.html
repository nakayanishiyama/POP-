<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POP依頼登録</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
      text-align: center;
    }

    .box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    input, select, textarea, button {
      width: 100%;
      font-size: 18px;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    select:disabled {
      background: #eeeeee;
      color: #333;
      font-weight: bold;
      opacity: 1;
    }

    button {
      border: none;
      font-weight: bold;
      margin-top: 14px;
    }

    button:disabled {
      opacity: 0.6;
    }

    .scan-btn {
      background: #1976d2;
      color: white;
      font-size: 20px;
      padding: 14px;
    }

    .stop-btn {
      background: #777;
      color: white;
    }

    .clear-btn {
      background: #999;
      color: white;
    }

    .submit-btn {
      background: #d32f2f;
      color: white;
      font-size: 24px;
      padding: 16px;
    }

    .store-fixed {
      background: #fff3cd;
      border: 1px solid #ffecb5;
      color: #7a5200;
      font-weight: bold;
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      text-align: center;
      display: none;
    }

    #reader {
      width: 100%;
      margin-top: 12px;
    }

    #message {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .ok {
      color: #0a8f08;
    }

    .ng {
      color: #d32f2f;
    }

    .history-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .history-item {
      font-size: 15px;
      padding: 8px;
      border-bottom: 1px solid #eee;
      line-height: 1.4;
    }

    .small-note {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
      line-height: 1.4;
    }

    .price-note {
      background: #eef6ff;
      border: 1px solid #c8e1ff;
      color: #0b4f8a;
      font-size: 14px;
      padding: 8px;
      border-radius: 8px;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <h1>POP依頼登録</h1>

  <div class="box">
    <button class="scan-btn" onclick="startScan()">JANをカメラで読む</button>
    <button class="stop-btn" onclick="stopScan()">カメラ停止</button>
    <div id="reader"></div>
  </div>

  <div class="box">
    <label>店舗</label>
    <select id="store">
      <option value="海老名">海老名</option>
      <option value="座間入谷">座間入谷</option>
      <option value="大沼">大沼</option>
      <option value="寒川">寒川</option>
      <option value="戸塚">戸塚</option>
    </select>
    <div id="storeFixedMessage" class="store-fixed"></div>

    <label>JANコード</label>
    <input id="jan" type="text" inputmode="numeric" placeholder="JANコード">

    <label>売価（税抜）</label>
    <input id="price" type="text" inputmode="numeric" placeholder="空白または0なら定番売価" enterkeyhint="done">
    <div class="price-note">
      売価を空白または0で登録すると、商品マスタの「税抜売価」を使用します。<br>
      値下げ価格を指定する場合だけ金額を入力してください。
    </div>

    <label>POP種類</label>
    <select id="popType">
      <option value="値下げ">値下げ</option>
    </select>

    <label>枚数</label>
    <input id="count" type="text" inputmode="numeric" value="1">

    <label>備考</label>
    <textarea id="note" rows="2" placeholder="任意"></textarea>

    <button id="submitButton" class="submit-btn" onclick="submitData()">登録する</button>
    <button class="clear-btn" onclick="clearForm()">入力をクリア</button>

    <div class="small-note">
      JAN読取後は売価入力へ移動します。<br>
      定番売価で作る場合は、売価欄を空白のまま登録してください。
    </div>

    <div id="message"></div>
  </div>

  <div class="box">
    <div class="history-title">直近登録</div>
    <div id="history">
      <div class="history-item">まだ登録はありません</div>
    </div>
  </div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz6ekzBxSqXo9m0cHdyW10V1L7KSdIqyMiTvsalagmK5cb5xCaVN8dN5ACP2D4rOcVZ/exec';
  const SECRET_KEY = 'pop2026';

  const STORE_LIST = [
    '海老名',
    '座間入谷',
    '大沼',
    '寒川',
    '戸塚'
  ];

  let html5QrCode = null;
  let scanning = false;
  let submitting = false;
  let historyList = [];
  let callbackTimer = null;

  document.addEventListener('DOMContentLoaded', function() {
    initStoreFromUrl();
    setupEnterSubmit();
  });

  function setMessage(text, ok) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = ok ? 'ok' : 'ng';
  }

  function initStoreFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const storeParam = params.get('store');

    const storeSelect = document.getElementById('store');
    const fixedMessage = document.getElementById('storeFixedMessage');

    if (!storeParam) {
      storeSelect.disabled = false;
      fixedMessage.style.display = 'none';
      return;
    }

    const decodedStore = String(storeParam).trim();

    if (STORE_LIST.includes(decodedStore)) {
      storeSelect.value = decodedStore;
      storeSelect.disabled = true;

      fixedMessage.textContent = 'この端末の店舗：' + decodedStore;
      fixedMessage.style.display = 'block';

      setMessage('店舗を固定しました：' + decodedStore, true);
    } else {
      storeSelect.disabled = false;
      fixedMessage.style.display = 'none';

      setMessage('URLの店舗名が正しくありません：' + decodedStore, false);
    }
  }

  function setupEnterSubmit() {
    document.getElementById('price').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitData();
      }
    });

    document.getElementById('jan').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('price').focus();
      }
    });
  }

  function startScan() {
    if (scanning) {
      setMessage('すでにカメラ起動中です', true);
      return;
    }

    html5QrCode = new Html5Qrcode("reader");

    const config = {
      fps: 10,
      qrbox: { width: 280, height: 160 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E
      ]
    };

    setMessage('カメラを起動しています。許可を求められたら「許可」を押してください。', true);

    html5QrCode.start(
      { facingMode: "environment" },
      config,
      function(decodedText) {
        const jan = String(decodedText).replace(/\D/g, '');
        document.getElementById('jan').value = jan;
        setMessage('JAN読取成功：' + jan + '　売価入力、または空白で定番売価登録できます。', true);

        stopScan();

        setTimeout(function() {
          document.getElementById('price').focus();
        }, 300);
      },
      function(errorMessage) {
        // 読取途中のエラーは表示しない
      }
    ).then(function() {
      scanning = true;
      setMessage('カメラ起動中。バーコードを枠に合わせてください。', true);
    }).catch(function(err) {
      scanning = false;
      setMessage('カメラを起動できません：' + String(err), false);
    });
  }

  function stopScan() {
    if (!html5QrCode || !scanning) {
      return;
    }

    html5QrCode.stop().then(function() {
      html5QrCode.clear();
      scanning = false;
    }).catch(function(err) {
      scanning = false;
    });
  }

  function getFormData() {
    let janValue = document.getElementById('jan').value;
    let priceValue = document.getElementById('price').value;
    let countValue = document.getElementById('count').value;

    janValue = String(janValue).replace(/\D/g, '');
    priceValue = String(priceValue).replace(/[^\d]/g, '');
    countValue = String(countValue).replace(/[^\d]/g, '');

    if (priceValue === '') {
      priceValue = '0';
    }

    if (countValue === '') {
      countValue = '1';
    }

    return {
      store: document.getElementById('store').value,
      jan: janValue,
      price: priceValue,
      popType: document.getElementById('popType').value,
      count: countValue,
      note: document.getElementById('note').value
    };
  }

  function getPriceDisplay(price) {
    if (!price || Number(price) <= 0) {
      return '定番売価';
    }

    return price + '円';
  }

  function submitData() {
    if (submitting) {
      setMessage('登録処理中です。少し待ってください。', true);
      return;
    }

    const data = getFormData();

    if (!data.store) {
      setMessage('店舗を選択してください', false);
      return;
    }

    if (!STORE_LIST.includes(data.store)) {
      setMessage('店舗名が正しくありません', false);
      return;
    }

    if (!data.jan) {
      setMessage('JANコードを入力してください', false);
      document.getElementById('jan').focus();
      return;
    }

    if (!data.count || Number(data.count) <= 0) {
      setMessage('枚数を入力してください', false);
      document.getElementById('count').focus();
      return;
    }

    submitting = true;

    const submitButton = document.getElementById('submitButton');
    submitButton.disabled = true;
    submitButton.textContent = '登録中...';

    if (Number(data.price) <= 0) {
      setMessage('登録中... 定番売価で登録します。', true);
    } else {
      setMessage('登録中... 売価 ' + data.price + '円で登録します。', true);
    }

    sendJsonp(data);
  }

  function sendJsonp(data) {
    const callbackName = 'popCallback';
    const scriptId = 'popJsonpScript';
    const submitButton = document.getElementById('submitButton');

    // 古いscriptタグを削除
    const oldScript = document.getElementById(scriptId);
    if (oldScript) {
      oldScript.remove();
    }

    // 古いタイマーを削除
    if (callbackTimer) {
      clearTimeout(callbackTimer);
      callbackTimer = null;
    }

    let finished = false;

    window[callbackName] = function(result) {
      if (finished) {
        return;
      }

      finished = true;

      if (callbackTimer) {
        clearTimeout(callbackTimer);
        callbackTimer = null;
      }

      try {
        if (result && result.ok) {
          setMessage(
            '登録しました：' +
            data.store +
            ' / ' +
            result.jan +
            ' / ' +
            getPriceDisplay(data.price),
            true
          );

          addHistory(data);
          clearFormAfterSubmit();

        } else {
          setMessage(
            (result && result.error) ? result.error : '登録に失敗しました',
            false
          );
        }
      } finally {
        submitting = false;
        submitButton.disabled = false;
        submitButton.textContent = '登録する';

        const scriptEl = document.getElementById(scriptId);
        if (scriptEl) {
          scriptEl.remove();
        }
      }
    };

    const params = new URLSearchParams({
      action: 'save',
      key: SECRET_KEY,
      store: data.store,
      jan: data.jan,
      price: data.price,
      popType: data.popType,
      count: data.count,
      note: data.note || '',
      callback: callbackName,
      t: String(Date.now())
    });

    const url = WEB_APP_URL + '?' + params.toString();

    const script = document.createElement('script');
    script.id = scriptId;
    script.src = url;

    script.onerror = function() {
      if (finished) {
        return;
      }

      finished = true;

      if (callbackTimer) {
        clearTimeout(callbackTimer);
        callbackTimer = null;
      }

      submitting = false;
      submitButton.disabled = false;
      submitButton.textContent = '登録する';

      setMessage(
        '登録通信に失敗しました。\n通信先URL：' + url,
        false
      );

      const scriptEl = document.getElementById(scriptId);
      if (scriptEl) {
        scriptEl.remove();
      }
    };

    callbackTimer = setTimeout(function() {
      if (finished) {
        return;
      }

      finished = true;

      submitting = false;
      submitButton.disabled = false;
      submitButton.textContent = '登録する';

      setMessage(
        '登録応答がありません。時間を置いてスプレッドシートを確認してください。\n通信先URL：' + url,
        false
      );

      const scriptEl = document.getElementById(scriptId);
      if (scriptEl) {
        scriptEl.remove();
      }
    }, 15000);

    document.body.appendChild(script);
  }

  function clearFormAfterSubmit() {
    document.getElementById('jan').value = '';
    document.getElementById('price').value = '';
    document.getElementById('count').value = '1';
    document.getElementById('note').value = '';

    setTimeout(function() {
      document.getElementById('jan').focus();
    }, 300);
  }

  function clearForm() {
    document.getElementById('jan').value = '';
    document.getElementById('price').value = '';
    document.getElementById('count').value = '1';
    document.getElementById('note').value = '';

    setMessage('入力をクリアしました', true);
    document.getElementById('jan').focus();
  }

  function addHistory(data) {
    const now = new Date();
    const timeText =
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');

    historyList.unshift({
      time: timeText,
      store: data.store,
      jan: data.jan,
      price: data.price,
      count: data.count
    });

    historyList = historyList.slice(0, 5);

    renderHistory();
  }

  function renderHistory() {
    const history = document.getElementById('history');

    if (historyList.length === 0) {
      history.innerHTML = '<div class="history-item">まだ登録はありません</div>';
      return;
    }

    history.innerHTML = historyList.map(function(item) {
      return '<div class="history-item">' +
        item.time + '　' +
        item.store + '　' +
        item.jan + '　' +
        getPriceDisplay(item.price) + '　' +
        item.count + '枚' +
        '</div>';
    }).join('');
  }
</script>

</body>
</html>
